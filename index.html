<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرصد تعثرات متعهدي الاعاشة</title>
    
    <!-- Scripts & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes pulse-emerald {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .animate-pulse-custom { animation: pulse-emerald 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }

        tr:hover td { background-color: #f1f5f9; }
        .active-filter {
            border-color: currentColor !important;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transform: translateY(-4px);
        }
    </style>
</head>
<body class="antialiased text-slate-900 pb-20">

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[1000] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="w-16 h-16 border-4 border-emerald-500/20 border-t-emerald-500 rounded-full animate-spin"></div>
        <p class="text-white font-black mt-6 tracking-widest uppercase text-sm">جاري مزامنة البيانات...</p>
    </div>

    <!-- Header Section -->
    <header id="mainHeader" class="sticky top-0 z-50 py-5 transition-all duration-300">
        <div class="max-w-[1600px] mx-auto px-6 text-right">
            <div class="relative overflow-hidden bg-gradient-to-r from-slate-950 via-slate-800 to-emerald-950 rounded-[2.5rem] shadow-2xl p-7 flex flex-col lg:flex-row justify-between items-center gap-6">
                <div class="flex items-center gap-6 text-right">
                    <div class="bg-emerald-500/20 backdrop-blur-xl p-5 rounded-[2rem] border border-emerald-400/30 text-emerald-400 shadow-inner">
                        <i data-lucide="building-2" class="w-10 h-10 animate-pulse-custom"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl lg:text-3xl font-[900] text-white tracking-tight leading-none text-right">
                            مرصد تعثرات متعهدي الاعاشة
                            <span class="bg-emerald-500 text-slate-950 text-xs px-3 py-1 rounded-full font-black mr-3">2026</span>
                        </h1>
                        <p class="text-emerald-100/50 text-xs font-bold mt-2 flex items-center gap-2 justify-start">
                             <i data-lucide="shield-alert" class="w-4 h-4 text-emerald-400"></i> نظام تدقيق الخطة التشغيلية والامتثال
                        </p>
                    </div>
                </div>

                <div class="flex items-center gap-4 w-full lg:w-auto">
                    <div class="relative flex-grow lg:w-[450px]">
                        <i data-lucide="search" class="absolute right-5 top-1/2 -translate-y-1/2 text-emerald-400/40"></i>
                        <input 
                            type="text" id="searchInput" 
                            placeholder="ابحث برقم المركز، اسم المتعهد، أو الضابط..."
                            class="w-full pr-14 pl-6 py-4 rounded-3xl bg-white/10 border border-white/10 text-white placeholder:text-white/20 focus:bg-white/20 focus:border-emerald-400 outline-none transition-all font-bold text-right shadow-inner"
                        >
                    </div>
                    <button onclick="fetchData()" class="bg-emerald-500 hover:bg-emerald-400 text-slate-950 p-4 rounded-2xl transition-all shadow-lg active:scale-95 group">
                        <i data-lucide="refresh-cw" id="refreshIcon" class="w-6 h-6 transition-transform duration-700"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto px-6 mt-10">
        
        <!-- KPI Statistics -->
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-12" id="kpiContainer">
            <!-- KPIs generated by JS -->
        </div>

        <!-- Table Container -->
        <div class="bg-white rounded-[3.5rem] shadow-2xl shadow-slate-200/50 border border-slate-200/50 overflow-hidden">
            <div class="px-10 py-8 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                <div class="flex items-center gap-4 text-right">
                    <div class="bg-emerald-600 w-10 h-10 rounded-xl flex items-center justify-center text-white shadow-lg">
                        <i data-lucide="clipboard-check" class="w-5 h-5"></i>
                    </div>
                    <span class="text-lg font-[900] text-slate-700 tracking-wide uppercase">سجل تتبع الجاهزية والامتثال الميداني</span>
                </div>
                <div id="updateTime" class="px-5 py-2 rounded-2xl bg-emerald-100 text-emerald-700 text-[10px] font-black uppercase tracking-widest border border-emerald-200 flex items-center gap-2">
                    تحديث حي: --:--:--
                </div>
            </div>

            <div class="overflow-x-auto min-h-[500px]">
                <table class="w-full text-right border-collapse">
                    <thead>
                        <tr class="bg-slate-100/30 border-b-2 border-slate-100">
                            <th class="p-8 text-xs font-black text-slate-400 uppercase text-center border-l border-slate-100/30">المركز</th>
                            <th class="p-8 text-xs font-black text-slate-400 uppercase tracking-widest">متعهد الإعاشة</th>
                            <th class="p-8 text-xs font-black text-slate-400 uppercase tracking-widest">ضابط الاتصال</th>
                            <th class="p-8 text-xs font-black text-slate-400 uppercase text-center">الضابط</th>
                            <th class="p-8 text-xs font-black text-slate-400 uppercase text-center">الكيروسين</th>
                            <th class="p-8 text-xs font-black text-slate-400 uppercase text-center">التعهد</th>
                            <th class="p-8 text-xs font-black text-slate-400 uppercase text-center">الخطة التشغيلية</th>
                            <th class="p-8 text-xs font-black text-slate-400 uppercase text-center">الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="dataTableBody" class="divide-y divide-slate-50 text-sm font-medium">
                        <!-- Rows generated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer class="mt-20 text-center opacity-40 pb-10">
        <p class="text-slate-400 font-black text-sm uppercase tracking-[0.5em]">Hajj 2026 Compliance Monitoring | Mina Site</p>
    </footer>

    <script>
        const DATA_SOURCE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTUOdo0dr8lTA7HXUgX8-gQGwxc_8acqFd74sFMsZluu8R-uAsyw4wmifW9Y3iQld9wC47rHq3_mn_t/pub?gid=0&single=true&output=csv";

        const COL = {
            CONTRACTOR: 1,       // العمود B
            CENTER_ID: 7,        // العمود H
            LIAISON_STATUS: 14,  // العمود O
            LIAISON_NAME: 16,    // العمود Q
            LIAISON_PHONE: 17,   // العمود R
            KEROSENE_STATUS: 18, // العمود S
            COMMIT_STATUS: 21,   // العمود V
            PLAN_SUBMISSION: 26  // العمود AA (Index 26)
        };

        let masterData = [];
        let activeFilter = 'all';

        async function fetchData() {
            const refreshIcon = document.getElementById('refreshIcon');
            const loader = document.getElementById('loadingOverlay');
            
            if(refreshIcon) refreshIcon.classList.add('animate-spin');
            loader.style.display = 'flex';
            loader.style.opacity = '1';

            try {
                const response = await fetch(`${DATA_SOURCE_URL}&t=${Date.now()}`);
                if (!response.ok) throw new Error("Connection Error");
                
                const csvText = await response.text();
                const rows = csvText.split(/\r?\n/).slice(1);
                
                masterData = rows.map((rowStr, index) => {
                    const row = rowStr.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => 
                        cell.replace(/^["']|["']$/g, '').trim()
                    );

                    if (row.length < 27) return null;

                    const idRaw = row[COL.CENTER_ID] || "";
                    const idMatch = idRaw.match(/\d+/);
                    const numericId = idMatch ? parseInt(idMatch[0]) : (9000 + index);

                    const planText = row[COL.PLAN_SUBMISSION] || "";
                    const isPlanDone = planText === "تم التسليم";

                    return {
                        id: numericId,
                        displayId: idMatch ? idMatch[0] : numericId,
                        contractor: row[COL.CONTRACTOR] || "غير معرف",
                        officer: row[COL.LIAISON_NAME] || "غير مسجل",
                        phone: row[COL.LIAISON_PHONE] || "",
                        liaison: row[COL.LIAISON_STATUS]?.includes("تمت الافادة بضابط الاتصال من قبل المالك"),
                        kerosene: row[COL.KEROSENE_STATUS]?.includes("تم استلام الملفات"),
                        commitment: row[COL.COMMIT_STATUS]?.includes("تم التعبئة"),
                        plan: isPlanDone
                    };
                }).filter(Boolean);

                masterData.sort((a, b) => a.id - b.id);
                renderDashboard();
                document.getElementById('updateTime').innerText = "تحديث حي: " + new Date().toLocaleTimeString('ar-SA');

            } catch (err) {
                console.error(err);
            } finally {
                setTimeout(() => {
                    if(refreshIcon) refreshIcon.classList.remove('animate-spin');
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 500);
                }, 800);
            }
        }

        function renderDashboard() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            const stats = {
                total: masterData.length,
                liaison: masterData.filter(d => !d.liaison).length,
                kerosene: masterData.filter(d => !d.kerosene).length,
                commitment: masterData.filter(d => !d.commitment).length,
                plan: masterData.filter(d => !d.plan).length
            };

            const kpis = [
                { id: 'all', label: 'إجمالي المراكز', val: stats.total, color: 'slate', icon: 'users' },
                { id: 'liaison', label: 'نواقص ضابط', val: stats.liaison, color: 'orange', icon: 'user-minus' },
                { id: 'kerosene', label: 'نواقص كيروسين', val: stats.kerosene, color: 'amber', icon: 'fuel' },
                { id: 'commitment', label: 'نواقص التعهد', val: stats.commitment, color: 'indigo', icon: 'check-square' },
                { id: 'plan', label: 'نواقص الخطة التشغيلية', val: stats.plan, color: 'emerald', icon: 'clipboard-check' }
            ];

            const kpiContainer = document.getElementById('kpiContainer');
            kpiContainer.innerHTML = kpis.map(kpi => `
                <div onclick="setFilter('${kpi.id}')" class="cursor-pointer group p-6 rounded-[2rem] border-2 transition-all duration-300 ${activeFilter === kpi.id ? 'bg-white border-'+kpi.color+'-500 active-filter' : 'bg-white border-transparent shadow-sm hover:border-slate-200'}">
                    <div class="w-12 h-12 rounded-2xl flex items-center justify-center mb-4 transition-all ${activeFilter === kpi.id ? 'bg-'+kpi.color+'-500 text-white shadow-lg' : 'bg-slate-100 text-slate-400 group-hover:bg-'+kpi.color+'-50 group-hover:text-'+kpi.color+'-500'}">
                        <i data-lucide="${kpi.icon}" class="w-6 h-6"></i>
                    </div>
                    <h3 class="text-[10px] font-black text-slate-400 mb-1 uppercase tracking-tighter text-right">${kpi.label}</h3>
                    <div class="flex items-baseline gap-2 justify-start">
                        <p class="text-4xl font-[900] text-slate-800 tracking-tighter">${kpi.val}</p>
                        ${kpi.val > 0 && kpi.id !== 'all' ? '<span class="w-2 h-2 rounded-full bg-rose-500 animate-pulse"></span>' : ''}
                    </div>
                </div>
            `).join('');

            const filtered = masterData.filter(item => {
                const searchStr = `${item.contractor} ${item.displayId} ${item.officer}`.toLowerCase();
                const matchSearch = searchStr.includes(searchTerm);
                
                if (activeFilter === 'all') return matchSearch;
                if (activeFilter === 'liaison') return matchSearch && !item.liaison;
                if (activeFilter === 'kerosene') return matchSearch && !item.kerosene;
                if (activeFilter === 'commitment') return matchSearch && !item.commitment;
                if (activeFilter === 'plan') return matchSearch && !item.plan;
                return matchSearch;
            });

            const tbody = document.getElementById('dataTableBody');
            if(filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" class="p-32 text-center text-slate-300 font-black italic uppercase tracking-widest leading-relaxed">لا توجد سجلات مطابقة للرصد الحالي</td></tr>`;
            } else {
                tbody.innerHTML = filtered.map(item => {
                    const isReady = item.liaison && item.kerosene && item.commitment && item.plan;
                    return `
                        <tr class="group transition-all ${isReady ? 'bg-emerald-50/20' : ''}">
                            <td class="p-8 text-center border-l border-slate-50">
                                <span class="inline-flex items-center justify-center w-12 h-12 bg-slate-900 text-white rounded-xl font-black text-sm shadow-md">
                                    ${item.displayId}
                                </span>
                            </td>
                            <td class="p-8">
                                <div class="font-black text-slate-800 text-base leading-tight group-hover:text-emerald-700 transition-colors">${item.contractor}</div>
                            </td>
                            <td class="p-8">
                                <div class="text-sm font-black text-slate-700 mb-1">${item.officer}</div>
                                <div class="text-[9px] font-black text-slate-400 flex items-center gap-2 bg-slate-100 w-fit px-2 py-1 rounded-lg">
                                    <i data-lucide="phone" class="w-3 h-3 text-emerald-500"></i> ${item.phone || "---"}
                                </div>
                            </td>
                            <td class="p-8 text-center">${statusIcon(item.liaison)}</td>
                            <td class="p-8 text-center">${statusIcon(item.kerosene)}</td>
                            <td class="p-8 text-center">${statusIcon(item.commitment)}</td>
                            <td class="p-8 text-center">${statusIcon(item.plan)}</td>
                            <td class="p-8 text-center">
                                ${!isReady ? `
                                    <button onclick='sendReminder(${JSON.stringify(item)})' class="bg-slate-950 text-white px-5 py-2.5 rounded-2xl hover:bg-emerald-500 hover:text-slate-950 transition-all shadow-lg flex items-center gap-2 mx-auto font-black text-[10px] uppercase">
                                        <i data-lucide="send" class="w-4 h-4"></i> تذكير
                                    </button>
                                ` : `
                                    <div class="flex items-center justify-center gap-2 text-emerald-600 font-black text-[10px] bg-emerald-500/10 py-2.5 px-5 rounded-2xl border border-emerald-500/20 mx-auto w-fit">
                                        <i data-lucide="check-circle" class="w-4 h-4"></i> جاهز تماماً
                                    </div>
                                `}
                            </td>
                        </tr>
                    `;
                }).join('');
            }
            lucide.createIcons();
        }

        function statusIcon(isDone) {
            return `
                <div class="p-2.5 rounded-xl inline-flex transition-all ${isDone ? 'bg-emerald-500 text-white shadow-lg shadow-emerald-500/10' : 'bg-slate-100 text-slate-300'}">
                    <i data-lucide="${isDone ? 'check-circle-2' : 'x-circle'}" class="w-6 h-6"></i>
                </div>
            `;
        }

        function setFilter(filterId) {
            activeFilter = filterId;
            renderDashboard();
        }

        function sendReminder(item) {
            let missing = [];
            if (!item.liaison) missing.push("وثيقة ضابط الاتصال");
            if (!item.kerosene) missing.push("شهادة الكيروسين");
            if (!item.commitment) missing.push("ملف التعهد");
            if (!item.plan) missing.push("الخطة التشغيلية (AA)");

            const msg = `السلام عليكم ورحمة الله وبركاته، الأستاذ ${item.officer} ضابط اتصال ${item.contractor}\n\nنحيطكم علماً بوجود نقص في المتطلبات الإدارية والتشغيلية لمركزكم بمنى رقم (${item.displayId}):\n${missing.map(m => ` • ${m}`).join('\n')}\n\nنأمل منكم سرعة استكمال المتطلبات لضمان الجاهزية التشغيلية.\nشاكرين لكم تعاونكم.`;
            
            let phonePart = item.phone.split(/[/\s,]+/)[0].replace(/[^0-9]/g, '');
            let finalPhone = phonePart;
            if (phonePart.startsWith('05')) finalPhone = '966' + phonePart.substring(1);
            else if (phonePart.startsWith('5')) finalPhone = '966' + phonePart;

            window.open(`https://wa.me/${finalPhone}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        document.getElementById('searchInput').addEventListener('input', renderDashboard);
        
        window.onload = () => {
            fetchData();
            setInterval(() => fetchData(), 60000);
            
            window.onscroll = () => {
                const header = document.getElementById('mainHeader');
                if(window.scrollY > 20) header.classList.add('bg-white/95', 'backdrop-blur-md', 'py-2');
                else header.classList.remove('bg-white/95', 'backdrop-blur-md', 'py-2');
            };
        };
    </script>
</body>
</html>
